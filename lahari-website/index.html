<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c9a24a" />
    <meta
      name="description"
      content="Lahari Legal Associates — a full-service law firm in Hyderabad delivering strategic representation across civil, criminal, corporate, and family law."
    />
    <title>Lahari Legal Associates | Trusted Legal Counsel in Hyderabad</title>

    <!-- No-flash theme bootstrap: applies saved theme before first paint. -->
    <script>
      (function () {
        try {
          var key = "ll-theme";
          var stored = localStorage.getItem(key);
          var theme = stored === "dark" || stored === "light" ? stored : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome (icons used throughout the UI) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
